<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Conquest — Notitia</title>
<style>
:root {
  --bg: #0a0a0e; --surface: #14141c; --text: #e0e0e0; --dim: #6b6b80;
  --accent: #6c8cff; --red: #e74c3c; --blue: #3498db; --green: #2ecc71; --yellow: #f1c40f;
  --gold: #d4a843; --danger: #c0392b;
}
*{box-sizing:border-box;margin:0}
html{font-size:16px}
body{
  font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--accent);text-decoration:none}
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.5rem;background:var(--surface);
  border-bottom:1px solid rgba(255,255,255,.06);
}
header .logo{font-weight:700;font-size:1.1rem;letter-spacing:-.02em}
header .logo span{color:var(--accent)}
nav a{margin-left:1.5rem;font-size:.88rem;color:var(--dim);transition:color .2s}
nav a:hover{color:var(--text)}

main{max-width:1100px;margin:0 auto;padding:1.5rem}
h1{font-size:1.6rem;font-weight:700;margin-bottom:.5rem}

/* Lobby */
.lobby{text-align:center;padding:4rem 1rem}
.lobby h2{font-size:2rem;margin-bottom:1rem}
.lobby p{color:var(--dim);margin-bottom:2rem}
.btn{
  display:inline-block;padding:.85rem 2rem;border-radius:8px;font-weight:600;
  font-size:.95rem;cursor:pointer;border:none;transition:all .2s;
  font-family:inherit;letter-spacing:.01em;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#5a7de6;transform:translateY(-1px)}
.btn-outline{
  background:transparent;color:var(--accent);border:1.5px solid rgba(108,140,255,.3);
}
.btn-outline:hover{background:rgba(108,140,255,.08)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:.5rem 1.2rem;font-size:.82rem}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.actions{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
.input{
  background:var(--surface);border:1px solid rgba(255,255,255,.1);
  color:var(--text);padding:.75rem 1rem;border-radius:6px;font-size:.95rem;
  width:220px;font-family:inherit;text-align:center;letter-spacing:.1em;
}
.input:focus{outline:none;border-color:var(--accent)}
.mode-select{display:flex;justify-content:center;gap:.5rem;margin-bottom:2rem}
.mode-option{
  padding:.75rem 1.5rem;border-radius:8px;cursor:pointer;font-weight:600;
  border:1.5px solid rgba(255,255,255,.1);background:var(--surface);color:var(--dim);
  transition:all .2s;font-size:.9rem;font-family:inherit;
}
.mode-option:hover{border-color:var(--accent);color:var(--text)}
.mode-option.active{border-color:var(--accent);color:var(--accent);background:rgba(108,140,255,.08)}
.player-count{display:flex;gap:.5rem;justify-content:center;margin:1rem 0}
.player-count button{
  width:44px;height:44px;border-radius:8px;border:1.5px solid rgba(255,255,255,.1);
  background:var(--surface);color:var(--text);cursor:pointer;font-weight:700;font-size:1rem;
}
.player-count button:hover,.player-count button.active{border-color:var(--accent);color:var(--accent)}

/* Game container */
.game-container{display:none}
.game-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1rem;flex-wrap:wrap;gap:.75rem;
}
.phase-indicator{
  padding:.4rem 1rem;border-radius:20px;font-size:.82rem;font-weight:600;
  border:1px solid rgba(255,255,255,.1);
}
.player-info{display:flex;gap:.5rem;flex-wrap:wrap}
.player-badge{
  display:flex;align-items:center;gap:.5rem;padding:.35rem .8rem;
  border-radius:20px;font-size:.82rem;font-weight:600;
  border:2px solid transparent;background:var(--surface);
}
.player-badge.active{border-color:var(--gold);color:var(--gold)}
.player-badge.eliminated{opacity:.4}
.player-badge .dot{width:10px;height:10px;border-radius:50%}

.board-wrap{position:relative;margin:1rem 0}
canvas{display:block;margin:0 auto;border-radius:12px;background:#0d0d14;max-width:100%}

.controls{
  background:var(--surface);border-radius:10px;padding:1.25rem;
  border:1px solid rgba(255,255,255,.06);
}
.controls h3{font-size:.95rem;margin-bottom:.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.controls p{margin-bottom:.5rem;font-size:.9rem}
.combat-log{max-height:180px;overflow-y:auto;font-size:.82rem;color:var(--dim);margin-top:.75rem}
.combat-log div{padding:.25rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
.combat-log .win{color:#2ecc71}
.combat-log .lose{color:#e74c3c}
.troop-select{display:flex;gap:.35rem;flex-wrap:wrap;margin:.5rem 0}
.troop-select button{
  width:38px;height:38px;border-radius:8px;border:1px solid rgba(255,255,255,.1);
  background:var(--bg);color:var(--text);cursor:pointer;font-weight:600;font-size:.85rem;
}
.troop-select button:hover{border-color:var(--accent)}
.troop-select button.sel{background:var(--accent);color:#fff;border-color:var(--accent)}

.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;
  align-items:center;justify-content:center;z-index:100;
}
.overlay-box{
  background:var(--surface);border-radius:12px;padding:2.5rem;
  text-align:center;max-width:420px;width:90%;border:1px solid rgba(255,255,255,.08);
}
.overlay-box h2{font-size:1.5rem;margin-bottom:.75rem}
.overlay-box p{color:var(--dim);margin-bottom:1.5rem}

.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  background:var(--surface);color:var(--text);padding:.6rem 1.2rem;
  border-radius:8px;font-size:.85rem;z-index:200;border:1px solid rgba(255,255,255,.1);
  animation:toastIn .3s ease-out;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.help{font-size:.78rem;color:var(--dim);margin-top:.5rem;line-height:1.4}

@media(max-width:700px){
  main{padding:.75rem}
  .lobby h2{font-size:1.4rem}
}
</style>
</head>
<body>

<header>
  <div class="logo">Notitia<span>Game</span></div>
  <nav>
    <a href="../">← Notitia</a>
  </nav>
</header>

<main>
  <!-- Lobby -->
  <div class="lobby" id="lobby">
    <h2>⚔️ Conquest</h2>
    <p>Jeu de stratégie. Conquérez les territoires, éliminez vos adversaires.</p>
    
    <div class="mode-select">
      <button class="mode-option active" onclick="setMode('local')" id="mode-local">🎮 Local (même écran)</button>
      <button class="mode-option" onclick="setMode('online')" id="mode-online">🌐 En ligne</button>
    </div>
    
    <div id="local-setup">
      <p style="margin-bottom:.5rem">Nombre de joueurs :</p>
      <div class="player-count" id="player-count">
        <button class="active" onclick="setPlayers(2)">2</button>
        <button onclick="setPlayers(3)">3</button>
        <button onclick="setPlayers(4)">4</button>
      </div>
      <div class="actions" style="margin-top:1.5rem">
        <button class="btn btn-primary" onclick="startLocal()">Lancer la partie</button>
      </div>
    </div>
    
    <div id="online-setup" style="display:none">
      <div class="actions">
        <button class="btn btn-primary" onclick="createRoom()">Créer une room</button>
        <button class="btn btn-outline" onclick="showJoin()">Rejoindre</button>
      </div>
      <div id="join-form" style="display:none;margin-top:2rem">
        <p style="margin-bottom:.75rem">Code de la room :</p>
        <div style="display:flex;gap:.5rem;justify-content:center">
          <input class="input" id="room-input" maxlength="6" placeholder="ABC123" autocomplete="off">
          <button class="btn btn-primary btn-sm" onclick="joinRoom()">Rejoindre</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Game -->
  <div class="game-container" id="game-container">
    <div class="game-header">
      <div>
        <h1 id="game-title" style="margin-bottom:.25rem;font-size:1.2rem">Conquest</h1>
        <span class="phase-indicator" id="phase-label">En attente...</span>
      </div>
      <div class="player-info" id="player-list"></div>
    </div>
    <div class="board-wrap">
      <canvas id="board" width="900" height="600"></canvas>
    </div>
    <div class="controls" id="controls">
      <h3 id="action-title">Tour</h3>
      <p id="action-info"></p>
      <div id="action-buttons" class="actions" style="margin:.75rem 0"></div>
      <div id="troop-selector" class="troop-select" style="display:none"></div>
      <p class="help" id="help-text"></p>
      <div class="combat-log" id="combat-log"></div>
    </div>
  </div>
</main>

<script>
// ═══════════ GAME ENGINE (pure JS, no server needed) ═══════════
const COLORS = ['#e74c3c','#3498db','#2ecc71','#f1c40f'];
const COLOR_NAMES = ['Rouge','Bleu','Vert','Jaune'];
const TERRITORIES = [
  {id:0,x:2,y:0,name:'Pic du Nord'},{id:1,x:4,y:0,name:'Portes de Fer'},{id:2,x:6,y:0,name:'Mur de Glace'},
  {id:3,x:1,y:2,name:'Vallée Verte'},{id:4,x:3,y:2,name:'Bois Sombre'},{id:5,x:5,y:2,name:'Plaine d\'Or'},
  {id:6,x:7,y:2,name:'Falaises'},{id:7,x:0,y:4,name:'Désert Rouge'},{id:8,x:2,y:4,name:'Oasis'},
  {id:9,x:4,y:4,name:'Grande Forêt'},{id:10,x:6,y:4,name:'Île Brumeuse'},{id:11,x:8,y:4,name:'Cap Est'},
  {id:12,x:1,y:6,name:'Ruines'},{id:13,x:3,y:6,name:'Citadelle'},{id:14,x:5,y:6,name:'Port Sud'},
  {id:15,x:7,y:6,name:'Marais'},{id:16,x:0,y:8,name:'Tour de Garde'},{id:17,x:2,y:8,name:'Carrefour'},
  {id:18,x:4,y:8,name:'Col du Dragon'},{id:19,x:6,y:8,name:'Île aux Serpents'},{id:20,x:8,y:8,name:'Phare'},
  {id:21,x:2,y:10,name:'Sanctuaire'},{id:22,x:4,y:10,name:'Port Royal'},{id:23,x:6,y:10,name:'Forteresse'}
];
const ADJ = [
  [1,3],[0,2,3,4],[1,5],[0,1,4,7],[1,3,5,8],[2,4,6,9],[5,10,11],[3,8],[4,7,9,12],
  [5,8,10,13],[6,9,11,14],[6,10,15],[8,13,16],[9,12,14,17],[10,13,15,18],[11,14,19],
  [12,17],[13,16,18,21],[14,17,19,22],[15,18,20,23],[19,23],[17,22],[18,21,23],[19,20,22]
];
const HEX_W=72, HEX_H=62;
const OFFSETS = TERRITORIES.map(t => {
  const odd = t.y % 4 !== 0;
  return {x:80+t.x*HEX_W*0.75+(odd?HEX_W*0.375:0), y:50+t.y*HEX_H*0.5};
});

let game, mode, playerCount=2, ws, roomCode;
let sel=null, atkSrc=null, phase='', troopCount=0, tempReinforce=[];

// ═══════════ CANVAS ═══════════
const canvas=document.getElementById('board'), ctx=canvas.getContext('2d');
function hex(cx,cy,r,fill,stroke,label){
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}
  ctx.closePath();ctx.fillStyle=fill;ctx.fill();
  ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();
  if(label){
    ctx.fillStyle='#fff';ctx.font='bold 18px Inter,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,cx,cy);
  }
}
function render(g){
  if(!g)return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;
  TERRITORIES.forEach(t=>{ADJ[t.id].forEach(a=>{ctx.beginPath();ctx.moveTo(OFFSETS[t.id].x,OFFSETS[t.id].y);ctx.lineTo(OFFSETS[a].x,OFFSETS[a].y);ctx.stroke()})});
  TERRITORIES.forEach(t=>{
    const p=OFFSETS[t.id],o=g.owners[t.id],tr=g.troops[t.id];
    const fill=o>=0?COLORS[o]:'#1a1a24';
    const stroke=sel===t.id?'#fff':atkSrc===t.id?'#f1c40f':'rgba(255,255,255,.15)';
    hex(p.x,p.y,28,fill,stroke,String(tr));
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='9px Inter,sans-serif';
    ctx.textAlign='center';ctx.fillText(t.name,p.x,p.y+34);
  });
}

// ═══════════ LOCAL GAME LOGIC ═══════════
function initLocalGame(n){
  game={owners:new Array(24).fill(-1), troops:new Array(24).fill(0), currentPlayer:0, phase:'reinforce', playerCount:n, winner:undefined, alive:new Set([...Array(n).keys()])};
  const terrs=[...Array(24).keys()];
  for(let i=terrs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[terrs[i],terrs[j]]=[terrs[j],terrs[i]];}
  const tpp=Math.floor(24/n);
  for(let p=0;p<n;p++){for(let i=0;i<tpp;i++){const idx=p*tpp+i;game.owners[terrs[idx]]=p;game.troops[terrs[idx]]=3;}}
  for(let i=n*tpp;i<24;i++){game.owners[terrs[i]]=i%n;game.troops[terrs[i]]=3;}
  game.availableTroops=Math.max(3,tpp);
  tempReinforce=[];sel=null;atkSrc=null;troopCount=game.availableTroops;
}

function territoryCount(p){
  let c=0;game.owners.forEach(o=>{if(o===p)c++;});return c;
}

function rollDice(c){
  const d=[];for(let i=0;i<c;i++)d.push(Math.floor(Math.random()*6)+1);
  return d.sort((a,b)=>b-a);
}

function resolveCombat(from,to){
  const aTr=game.troops[from]-1, dTr=game.troops[to];
  const aD=rollDice(Math.min(3,aTr)), dD=rollDice(Math.min(2,dTr));
  let aL=0,dL=0;
  const rds=Math.min(aD.length,dD.length);
  for(let i=0;i<rds;i++){if(aD[i]>dD[i])dL++;else aL++;}
  game.troops[from]-=aL;game.troops[to]-=dL;
  if(game.troops[to]<=0){
    const mv=Math.min(aD.length,aTr);
    game.owners[to]=game.owners[from];game.troops[to]=mv;game.troops[from]-=mv;
  }
  if(territoryCount(game.owners[to])===0){
    game.alive.delete(game.owners[to]);
    if(game.alive.size<=1){game.winner=game.alive.values().next().value;}
  }
  return{aD,dD,aL,dL};
}

function nextPlayer(){
  const n=game.playerCount;
  let np=(game.currentPlayer+1)%n;
  // Skip eliminated
  for(let i=0;i<n;i++){
    if(game.alive.has(np)){game.currentPlayer=np;break;}
    np=(np+1)%n;
  }
  game.phase='reinforce';game.availableTroops=Math.max(3,territoryCount(game.currentPlayer));
  troopCount=game.availableTroops;tempReinforce=[];sel=null;atkSrc=null;
}

// ═══════════ UI UPDATE ═══════════
function updateUI(){
  if(!game)return;
  const pl=document.getElementById('player-list');
  pl.innerHTML='';
  for(let i=0;i<game.playerCount;i++){
    const active=game.currentPlayer===i, elim=!game.alive.has(i);
    pl.innerHTML+=`<div class="player-badge${active?' active':''}${elim?' eliminated':''}"><span class="dot" style="background:${COLORS[i]}"></span>${COLOR_NAMES[i]}${elim?' 💀':''} (${territoryCount(i)} terr.)</div>`;
  }
  const ph=document.getElementById('phase-label'),ti=document.getElementById('action-title');
  const info=document.getElementById('action-info'),btns=document.getElementById('action-buttons');
  const help=document.getElementById('help-text'),ts=document.getElementById('troop-selector');
  ts.style.display='none';btns.innerHTML='';
  
  if(game.winner!==undefined){
    ph.textContent='Partie terminée';ti.textContent='🏆 Victoire !';
    info.textContent=`${COLOR_NAMES[game.winner]} a conquis tous les territoires !`;
    btns.innerHTML='<button class="btn btn-primary" onclick="location.reload()">Rejouer</button>';
    return;
  }
  
  const pn=COLOR_NAMES[game.currentPlayer];
  ph.textContent=game.phase.toUpperCase();ti.textContent=`Tour de ${pn}`;
  phase=game.phase;
  
  switch(game.phase){
    case'reinforce':
      info.textContent=`Placez ${troopCount} renfort${troopCount>1?'s':''}. Cliquez sur vos territoires.`;
      help.textContent='Chaque clic ajoute 1 troupe. Répartissez sur plusieurs territoires.';
      btns.innerHTML=`<button class="btn btn-sm btn-outline" onclick="skipReinforce()">Passer (${troopCount})</button>`;
      if(troopCount===0)btns.innerHTML='<button class="btn btn-primary btn-sm" onclick="endReinforce()">Terminer → Attaque</button>';
      break;
    case'attack':
      info.textContent='Attaque : sélectionnez votre territoire, puis ennemi adjacent.';
      help.textContent='Au moins 2 troupes sur le territoire attaquant.';
      btns.innerHTML='<button class="btn btn-sm btn-outline" onclick="endAttack()">Fin des attaques → Fortifier</button>';
      break;
    case'fortify':
      info.textContent='Fortifiez : déplacez des troupes entre vos territoires adjacents.';
      help.textContent='Source puis destination puis nombre. 1 troupe minimum doit rester.';
      btns.innerHTML='<button class="btn btn-primary btn-sm" onclick="endFortify()">Terminer le tour</button>';
      break;
  }
  render(game);
  window.dispatchEvent(new Event('resize'));
}

// ═══════════ CANVAS CLICK ═══════════
canvas.addEventListener('click',e=>{
  if(!game||game.winner!==undefined)return;
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(canvas.width/r.width), my=(e.clientY-r.top)*(canvas.height/r.height);
  let best=-1,bd=Infinity;
  TERRITORIES.forEach(t=>{const d=Math.hypot(OFFSETS[t.id].x-mx,OFFSETS[t.id].y-my);if(d<35&&d<bd){best=t.id;bd=d;}});
  if(best<0)return;
  
  if(phase==='reinforce'){
    if(game.owners[best]!==game.currentPlayer||troopCount<=0)return;
    game.troops[best]++;troopCount--;
    if(troopCount<=0)updateUI();else{document.getElementById('action-info').textContent=`Placez ${troopCount} renfort${troopCount>1?'s':''}...`;render(game);}
    return;
  }
  if(phase==='attack'){
    if(atkSrc===null){
      if(game.owners[best]!==game.currentPlayer||game.troops[best]<2)return;
      atkSrc=best;sel=best;
      document.getElementById('action-info').textContent=`Attaque depuis ${TERRITORIES[best].name}. Choisissez une cible.`;
      render(game);return;
    }
    if(game.owners[best]!==game.currentPlayer&&ADJ[atkSrc].includes(best)){
      const r=resolveCombat(atkSrc,best);
      addLog(atkSrc,best,r.aD,r.dD,r.aL,r.dL);
      sel=null;atkSrc=null;
      if(game.winner!==undefined){updateUI();return;}
      updateUI();return;
    }
    atkSrc=null;sel=null;updateUI();return;
  }
  if(phase==='fortify'){
    if(atkSrc===null){
      if(game.owners[best]!==game.currentPlayer||game.troops[best]<2)return;
      atkSrc=best;sel=best;
      document.getElementById('action-info').textContent=`Source: ${TERRITORIES[best].name} (${game.troops[best]}). Choisissez la destination.`;
      render(game);return;
    }
    if(game.owners[best]===game.currentPlayer&&ADJ[atkSrc].includes(best)&&best!==atkSrc){
      showTroops(atkSrc,best);return;
    }
    atkSrc=null;sel=null;updateUI();return;
  }
});

function showTroops(src,dst){
  const ts=document.getElementById('troop-selector');
  const max=game.troops[src]-1;
  ts.style.display='flex';ts.innerHTML='';
  document.getElementById('action-info').textContent=`${TERRITORIES[src].name} → ${TERRITORIES[dst].name} (max ${max})`;
  for(let i=1;i<=max;i++){
    const b=document.createElement('button');b.textContent=i;
    b.onclick=()=>{
      game.troops[src]-=i;game.troops[dst]+=i;
      ts.style.display='none';atkSrc=null;sel=null;updateUI();
    };
    ts.appendChild(b);
  }
}

function skipReinforce(){troopCount=0;updateUI();}
function endReinforce(){game.phase='attack';atkSrc=null;sel=null;updateUI();}
function endAttack(){game.phase='fortify';atkSrc=null;sel=null;updateUI();}
function endFortify(){nextPlayer();updateUI();}

function addLog(atk,def,aD,dD,aL,dL){
  const div=document.getElementById('combat-log');
  const aN=TERRITORIES[atk].name,dN=TERRITORIES[def].name;
  const cls=dL>aL?'win':aL>dL?'lose':'';
  div.innerHTML=`<div class="${cls}">⚔️ ${aN} [${aD.join(',')}] vs ${dN} [${dD.join(',')}] → Att: -${aL}, Def: -${dL}</div>`+div.innerHTML;
  if(div.children.length>30)div.removeChild(div.lastChild);
}

// ═══════════ LOBBY ═══════════
function setMode(m){mode=m;document.querySelectorAll('.mode-option').forEach(b=>b.classList.remove('active'));document.getElementById('mode-'+m).classList.add('active');
  document.getElementById('local-setup').style.display=m==='local'?'block':'none';
  document.getElementById('online-setup').style.display=m==='online'?'block':'none';
}
function setPlayers(n){playerCount=n;document.querySelectorAll('#player-count button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');}
function startLocal(){initLocalGame(playerCount);showGame(`Partie locale — ${playerCount} joueurs`);}
function showJoin(){document.getElementById('join-form').style.display='block';}
function showGame(title){
  document.getElementById('lobby').style.display='none';
  document.getElementById('game-container').style.display='block';
  document.getElementById('game-title').textContent=title;
  updateUI();
}

// ═══════════ ONLINE MODE ═══════════
function getWsUrl(){const p=location.protocol==='https:'?'wss':'ws';return`${p}://${location.host}`;}
function createRoom(){ws=new WebSocket(getWsUrl());ws.onopen=()=>ws.send(JSON.stringify({type:'create_room',playerCount}));
  ws.onmessage=e=>{const m=JSON.parse(e.data);
    if(m.type==='room_created'){roomCode=m.roomCode;showGame(`Room: ${roomCode}`);game=null;toast(`Room: ${roomCode} — attendez les joueurs...`);}
    else handleOnline(m);
  };
}
function joinRoom(){
  const c=document.getElementById('room-input').value.trim().toUpperCase();if(!c)return toast('Entrez un code');
  ws=new WebSocket(getWsUrl());ws.onopen=()=>ws.send(JSON.stringify({type:'join_room',roomCode:c}));
  ws.onmessage=e=>{const m=JSON.parse(e.data);handleOnline(m);};
}
function handleOnline(m){
  switch(m.type){
    case'joined':showGame(`Room: ${m.roomCode}`);game=null;toast('Connecté !');break;
    case'player_list':break;
    case'game_start':game=m.state;updateUI();toast('⚔️ La partie commence !');break;
    case'state_update':game=m.state;sel=null;atkSrc=null;updateUI();break;
    case'combat_result':addLog(m.attacker,m.defender,m.aDice,m.dDice,m.aLoss,m.dLoss);break;
    case'game_over':game=m.state;updateUI();break;
    case'error':toast(m.message);break;
  }
}
function send(m){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(m));}

// ═══════════ UTILS ═══════════
let tt;
function toast(m){
  const e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);
  clearTimeout(tt);tt=setTimeout(()=>e.remove(),3000);
}
window.addEventListener('resize',()=>{const w=document.querySelector('.board-wrap');if(w)canvas.style.width=Math.min(w.clientWidth-8,900)+'px';});
setMode('local');
</script>
